<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sự Kiện Đặc Biệt</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBase: '#0F0F1A',
                        darkSurface: '#1A1A2E',
                        brandPurple: '#7C3AED',
                        brandPink: '#EC4899',
                        brandYellow: '#FACC15',
                    },
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-transparent text-white font-sans antialiased selection:bg-brandPurple selection:text-white">

    <!-- Header Section -->
    <header id="event-header" class="sticky top-0 z-50 bg-transparent  border-b border-white/10 pt-4 pb-4">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/25 hover:bg-white/40 transition text-white">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 id="event-title" class="text-xl font-extrabold text-center flex-1 mx-4 truncate">
                Đang tải...
            </h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 pb-24">
        
        <!-- Event Banner -->
        <div id="event-banner" class="w-full rounded-3xl p-6 mb-8 flex flex-col items-center justify-center text-center shadow-lg transition-all duration-300">
            <div id="event-emoji" class="text-6xl mb-4 filter drop-shadow-md">✨</div>
            <h2 id="event-name" class="text-2xl font-black mb-2">Sự Kiện</h2>
            <p id="event-date" class="text-white/80 font-medium text-sm mb-4">Ngày</p>
            <div id="event-countdown" class="bg-black/50  px-5 py-2 rounded-xl border border-white/20">
                <span class="text-sm font-bold opacity-90" id="event-countdown-text">...</span>
            </div>
        </div>

        <!-- Section Title -->
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold"><i class="fa-solid fa-gift text-brandPink mr-2"></i>Gợi ý quà tặng</h3>
            <span id="product-count" class="text-xs font-bold bg-white/10 px-2 py-1 rounded-lg text-white/70">0 món</span>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-center bg-white/5 rounded-2xl border border-white/10">
            <div class="text-5xl mb-3">🛍️</div>
            <h2 class="text-base font-bold mb-1">Chưa có quà gợi ý</h2>
            <p class="text-white/40 text-xs">Chúng tôi đang cập nhật thêm quà tặng cho dịp này.</p>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <!-- Products will be injected here by JS -->
        </div>
    </main>

    <!-- App JS -->
    <script src="data.js"></script>
    <script src="event.js"></script>
</body>
</html>
